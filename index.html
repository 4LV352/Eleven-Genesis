<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#071A12">
    <title>Eleven Genesis — Manager</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/tension.css">
</head>
<body>
    <div id="app">
        <header class="topbar" id="topbar">
            <div>
                <strong id="header-club">Eleven Genesis</strong>
                <span id="header-season">1970 - Rodada 1</span>
            </div>
            <button class="icon-action" id="settings-button" type="button" aria-label="Configurações" data-i18n-aria-label="nav.settings">CFG</button>
        </header>

        <main id="screen-root" aria-live="polite"></main>

        <nav class="bottom-nav" id="bottom-nav" aria-label="Navegacao principal">
            <button type="button" class="nav-button" data-screen="home" data-i18n="nav.home"></button>
            <button type="button" class="nav-button" data-screen="squad" data-i18n="nav.squad"></button>
            <button type="button" class="nav-button" data-screen="tactics" data-i18n="nav.tactics"></button>
            <button type="button" class="nav-button" data-screen="market" data-i18n="nav.market"></button>
            <button type="button" class="nav-button" data-screen="scout" data-i18n="nav.scout"></button>
            <button type="button" class="nav-button" data-screen="academy" data-i18n="nav.academy"></button>
            <button type="button" class="nav-button" data-screen="marketing" data-i18n="nav.marketing"></button>
            <button type="button" class="nav-button" data-screen="league" data-i18n="nav.league"></button>
            <button type="button" class="nav-button" data-screen="club" data-i18n="nav.club"></button>
        </nav>

        <div class="toast" id="toast" role="status" aria-live="polite"></div>
        <div class="modal-root" id="modal-root" aria-live="polite"></div>
    </div>

    <div id="tension-overlay" class="tension-overlay hidden" aria-live="assertive" aria-modal="true" role="dialog">
        <section class="tension-card" aria-labelledby="tension-headline">
            <div class="tension-card-header">
                <span id="tension-minute" class="minute">90+'</span>
                <span id="tension-type" class="event-type">MOMENTO DECISIVO</span>
            </div>
            <h1 id="tension-headline" class="headline">O JOGO GANHOU ALMA</h1>
            <p id="tension-narrative" class="narrative"></p>
            <div class="tension-actions">
                <button id="btn-continue" class="btn-continue" type="button">Continuar</button>
            </div>
        </section>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/eventBus.js"></script>
    <script src="js/matchdayRitual.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
