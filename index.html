<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#071A12">
    <title>Eleven Genesis — Manager</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/tension.css">
    <link rel="stylesheet" href="css/analog-era.css">
    <link rel="stylesheet" href="css/eg15-physical-room.css">
    <link rel="stylesheet" href="css/eg16-time-office.css">
    <link rel="stylesheet" href="css/eg18-scene-navigation.css">
    <link rel="stylesheet" href="css/eg21-ux-zero-scroll.css">
    <link rel="stylesheet" href="css/eg22-ui-pro-rebuild.css">
</head>
<body>
    <div id="app">
        <header class="topbar" id="topbar">
            <div>
                <strong id="header-club">Eleven Genesis</strong>
                <span id="header-season">1970 - Rodada 1</span>
            </div>
            <button class="icon-action" id="settings-button" type="button" aria-label="Configurações" data-i18n-aria-label="nav.settings">CFG</button>
        </header>

        <aside class="desktop-sidebar" id="desktop-sidebar" aria-label="Navegação principal desktop">
            <div class="desktop-sidebar-brand">
                <strong>XI GENESIS</strong>
                <span>Manager Room</span>
            </div>
            <nav class="desktop-sidebar-nav">
                <button type="button" class="desktop-nav-button" data-screen="home" data-i18n="nav.home"></button>
                <button type="button" class="desktop-nav-button" data-screen="squad" data-i18n="nav.squad"></button>
                <button type="button" class="desktop-nav-button" data-screen="tactics" data-i18n="nav.tactics"></button>
                <button type="button" class="desktop-nav-button" data-screen="market" data-i18n="nav.market"></button>
                <button type="button" class="desktop-nav-button" data-screen="scout" data-i18n="nav.scout"></button>
                <button type="button" class="desktop-nav-button" data-screen="academy" data-i18n="nav.academy"></button>
                <button type="button" class="desktop-nav-button" data-screen="marketing" data-i18n="nav.marketing"></button>
                <button type="button" class="desktop-nav-button" data-screen="league" data-i18n="nav.league"></button>
                <button type="button" class="desktop-nav-button" data-screen="club" data-i18n="nav.club"></button>
            </nav>
            <div class="desktop-sidebar-footer">
                <button type="button" class="desktop-advance-button" data-action="advance-week">PRÓXIMO JOGO</button>
            </div>
        </aside>

        <main id="screen-root" aria-live="polite"></main>

        <nav class="bottom-nav eg3-bottom-nav" id="bottom-nav" aria-label="Navegacao principal">
            <button type="button" class="nav-button" data-screen="home" data-short-label="Início" data-i18n="nav.home"></button>
            <button type="button" class="nav-button" data-screen="squad" data-short-label="Elenco" data-i18n="nav.squad"></button>
            <button type="button" class="nav-button eg3-nav-action" data-action="advance-week" data-short-label="Jogar">▶</button>
            <button type="button" class="nav-button" data-screen="scout" data-short-label="Scout" data-i18n="nav.scout"></button>
            <button type="button" class="nav-button" data-action="menu-more" data-short-label="Menu">☰</button>
        </nav>

        <div class="eg3-mobile-menu hidden" id="eg3-mobile-menu" aria-hidden="true">
            <div class="eg3-mobile-menu-backdrop" data-action="close-menu-more"></div>
            <section class="eg3-mobile-menu-panel" aria-label="Mais opções">
                <div class="eg3-mobile-menu-head">
                    <strong>Menu do Clube</strong>
                    <button type="button" class="icon-action" data-action="close-menu-more" aria-label="Fechar menu">×</button>
                </div>
                <div class="eg3-mobile-menu-grid">
                    <button type="button" data-screen="tactics">⚽ <span>Tática</span></button>
                    <button type="button" data-screen="market">💼 <span>Mercado</span></button>
                    <button type="button" data-screen="academy">🌱 <span>Base</span></button>
                    <button type="button" data-screen="league">🏆 <span>Liga</span></button>
                    <button type="button" data-screen="club">🏟 <span>Clube</span></button>
                    <button type="button" data-screen="marketing">📢 <span>Marketing</span></button>
                    <button type="button" data-screen="calendar">📅 <span>Calendário</span></button>
                    <button type="button" data-screen="settings">⚙ <span>Config.</span></button>
                </div>
            </section>
        </div>

        <div class="toast" id="toast" role="status" aria-live="polite"></div>
        <div class="modal-root" id="modal-root" aria-live="polite"></div>
    </div>

    <div id="eg-drawer-overlay" class="eg-drawer-overlay hidden" aria-hidden="true">
        <aside id="eg-drawer-panel" class="eg-drawer-panel" role="dialog" aria-modal="true" aria-labelledby="eg-drawer-title">
            <button id="eg-drawer-close" class="eg-drawer-close" type="button" aria-label="Fechar painel">x</button>
            <div id="eg-drawer-content" class="eg-drawer-content"></div>
        </aside>
    </div>

    <div id="tension-overlay" class="tension-overlay hidden" aria-live="assertive" aria-modal="true" role="dialog">
        <section class="tension-card" aria-labelledby="tension-headline">
            <div class="tension-card-header">
                <span id="tension-minute" class="minute">90+'</span>
                <span id="tension-type" class="event-type">MOMENTO DECISIVO</span>
            </div>
            <h1 id="tension-headline" class="headline">O JOGO GANHOU ALMA</h1>
            <p id="tension-narrative" class="narrative"></p>
            <div class="tension-actions">
                <button id="btn-continue" class="btn-continue" type="button">Continuar</button>
            </div>
        </section>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/eventBus.js"></script>
    <script src="js/matchdayRitual.js"></script>
    <script src="js/app.js"></script>
    <script src="js/analog-era.js"></script>
    <script src="js/eg15-physical-room.js"></script>
    <script src="js/eg17-era-engine.js"></script>
    <script src="js/eg16-time-office.js"></script>
    <script src="js/eg18-scene-navigation.js"></script>
    <script src="js/eg21-ux-zero-scroll.js"></script>
    <script src="js/eg22-ui-pro-rebuild.js"></script>
</body>
</html>
